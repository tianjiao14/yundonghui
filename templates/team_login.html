<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>领队报名登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-2xl w-96 text-center border-t-4 border-orange-500">
        <h1 class="text-2xl font-bold mb-6 text-orange-600">🏃 领队报名系统</h1>
        <input type="text" id="user" placeholder="代表队名称 (如: 高一1班)" class="w-full border p-2 rounded mb-3 focus:ring-2 focus:ring-orange-500 outline-none">
        <input type="password" id="pwd" placeholder="登录密码" class="w-full border p-2 rounded mb-4 focus:ring-2 focus:ring-orange-500 outline-none">
        <button onclick="login()" class="w-full bg-orange-500 text-white py-2 rounded font-bold hover:bg-orange-600">登 录</button>
        <p class="text-xs text-gray-400 mt-4">* 密码请向组委会索取</p>
    </div>
    <script>
        function login() {
            fetch('/api/auth', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'team', username: document.getElementById('user').value, password: document.getElementById('pwd').value })
            }).then(r=>r.json()).then(res => {
                if(res.status==='success') location.href = res.redirect;
                else alert(res.msg);
            });
        }
    </script>
</body>
</html>
